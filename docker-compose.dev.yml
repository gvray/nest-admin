services:
  mysql:
    image: mysql:8.0
    container_name: nest-admin-mysql-dev
    restart: unless-stopped
    env_file:
      - path: .env.${ENV:-development}
        required: false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nest_admin}
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - nest-dev
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: nest-admin-app-dev
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - path: .env.${ENV:-development}
        required: false
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-password}@mysql:3306/${MYSQL_DATABASE:-nest_admin}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-local-only}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: ${PORT:-3000}
      ENABLE_CORS: ${ENABLE_CORS:-true}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./src:/app/src
    networks:
      - nest-dev

volumes:
  mysql-dev-data:

networks:
  nest-dev:
    driver: bridge
