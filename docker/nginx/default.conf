# ── Rate limiting ─────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream nestjs {
least_conn;
server app:8001 max_fails=3 fail_timeout=30s;
keepalive 32;
}

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
server {
listen 80;
server_name _;
return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
listen 443 ssl http2;
server_name _; # replace with your domain

# TLS
ssl_certificate /etc/nginx/certs/fullchain.pem;
ssl_certificate_key /etc/nginx/certs/privkey.pem;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;
ssl_stapling on;
ssl_stapling_verify on;

client_max_body_size 10m;
limit_conn perip 100;

# Security headers
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# CORS (NestJS runs with ENABLE_CORS=false; handled here)
set $cors_origin "";
if ($http_origin ~* "^https://(your-frontend-domain\.com)$") {
set $cors_origin $http_origin;
}
add_header Access-Control-Allow-Origin $cors_origin always;
add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Access-Token, Cache-Control" always;
add_header Access-Control-Allow-Credentials "true" always;
add_header Access-Control-Max-Age "86400" always;

if ($request_method = OPTIONS) {
add_header Content-Type "text/plain charset=UTF-8";
add_header Content-Length 0;
return 204;
}

# Health check — no rate limit, no access log
location = /health {
proxy_pass http://nestjs;
proxy_http_version 1.1;
proxy_set_header Connection "";
access_log off;
}

# Auth — strict rate limit
location ~* ^/auth/ {
limit_req zone=auth burst=5 nodelay;
limit_req_status 429;
include /etc/nginx/conf.d/proxy_params.conf;
}

# All other traffic
location / {
limit_req zone=api burst=20 nodelay;
limit_req_status 429;
include /etc/nginx/conf.d/proxy_params.conf;
}

access_log /var/log/nginx/nestadmin.access.log main buffer=16k flush=5s;
error_log /var/log/nginx/nestadmin.error.log warn;
}
