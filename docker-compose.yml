services:
  mysql:
    image: mysql:8.0
    container_name: nest-admin-mysql-test
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: nest_admin
    volumes:
      - mysql-test-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - nest-test
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: nest-admin-app-test
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: test
      DATABASE_URL: mysql://root:password@mysql:3306/nest_admin
      JWT_SECRET: test-jwt-secret-local-only
      JWT_EXPIRES_IN: 7d
      PORT: 8001
      ENABLE_CORS: "true"
    ports:
      - "8001:8001"
    networks:
      - nest-test

volumes:
  mysql-test-data:

networks:
  nest-test:
    driver: bridge

