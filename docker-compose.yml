services:
  mysql:
    image: mysql:8.0
    container_name: gvray-admin-mysql
    restart: unless-stopped
    env_file:
      - path: .env.${ENV:-production}
        required: false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gvray_admin}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - nest-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  app:
    image: ${IMAGE:-gvray/gvray-admin:latest}
    container_name: gvray-admin-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - path: .env.${ENV:-production}
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-password}@mysql:3306/${MYSQL_DATABASE:-gvray_admin}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: ${PORT:-8001}
      ENABLE_CORS: ${ENABLE_CORS:-true}
    ports:
      - "${PORT:-8001}:${PORT:-8001}"
    networks:
      - nest-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:$$PORT/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: ${WEB_IMAGE:-gvray/react-umi-admin:latest}
    container_name: gvray-admin-web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - nest-net

volumes:
  mysql-data:

networks:
  nest-net:
    driver: bridge
